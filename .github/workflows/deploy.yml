name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 178.21.11.252 >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new root@178.21.11.252 "echo '✅ SSH connection successful!'"

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key root@178.21.11.252 << 'EOF'
            echo "=== Connected to server ==="
            cd /root
            pwd
            ls -la
            echo "=== Deployment completed ==="
          EOF

# test