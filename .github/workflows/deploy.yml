name: Auto Deploy

on:
  push:
    branches: [ main ]  # или master, если ваша основная ветка называется master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}      
          username: ${{ secrets.SERVER_USER }}  
          key: ${{ secrets.SSH_PRIVATE_KEY }}   
          port: 22                              
          script: |
            cd /home/aiv/ADS/CRM-main                    
            git pull                             # Если репозиторий уже склонирован
            