name: Auto Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 178.21.11.252 >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude 'storage/logs/*' \
            --exclude 'vendor' \
            ./ root@178.21.11.252:/home/aiv/ADS/CRM-main/

      - name: Set permissions
        run: |
          ssh -i ~/.ssh/deploy_key root@178.21.11.252 << 'EOF'
            cd /home/aiv/ADS/CRM-main
            echo "=== Files deployed ==="
            ls -la
            echo "=== Total files: $(find . -type f | wc -l) ==="
          EOF