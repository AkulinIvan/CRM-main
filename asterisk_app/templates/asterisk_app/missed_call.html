<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Пропущенный звонок</title>
</head>
<body>
    <h2>Пропущенный звонок от {{ phone }}</h2>
    <p><strong>Дата/время:</strong> {{ call_date }}</p>
    <p><strong>Длительность:</strong> {{ duration }} сек</p>
    
    <p>Создан тикет <a href="{{ ticket_url }}">#{{ ticket_id }}</a></p>
    
    <p>--<br>
    Это автоматическое уведомление. Пожалуйста, не отвечайте на это письмо.
    </p>
</body>
</html>
