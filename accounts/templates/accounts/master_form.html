{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-light py-3">
            <h2 class="mb-0">{{ title }}</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="d-flex justify-content-between mt-4">
                    <a href="{% if master %}{% url 'accounts:master_detail' master.pk %}{% else %}{% url 'accounts:master_list' %}{% endif %}" 
                       class="btn btn-secondary">
                        Отмена
                    </a>
                    <button type="submit" class="btn btn-primary">
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
